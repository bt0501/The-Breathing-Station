<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breathing Station v8.6 - Baitan_0501 白坦</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="icon" type="image/png" href="https://github.com/bt0501/The-Breathing-Station/blob/main/ico.png?raw=true">
    <link rel="stylesheet" href="style.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="main-container">
    <div class="top-panel">
        <div><div class="label">UTC Time</div><h1 id="utc-time">00:00:00</h1></div>
        <div id="btc-box" class="stat-box"><span class="label">BTC/USDT LIVE</span><span id="btc-price" class="stat-value" style="color: var(--accent);">$---</span></div>
        <div class="stat-box"><span class="label">Fear & Greed</span><span id="fg-value" class="stat-value">--</span><span id="fg-text" style="font-size:0.5rem; color:#848e9c;">Loading...</span></div>
        <div class="stat-box"><span class="label">ETH Gas</span><span id="gas-value" class="stat-value" style="color:var(--local)">-- Gwei</span></div>
        <div style="text-align:right"><div class="label">Local Time</div><div id="local-time" style="font-size:1.2rem; font-weight:bold">00:00:00</div></div>
    </div>

    <div class="timeline-wrapper">
        <div id="cursor"></div>
        <div class="time-scale" id="scale"></div>
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <div class="tools-grid">
        <!-- ТЕРМИНАЛ -->
        <div class="box">
            <div class="box-header">
                <div class="box-title">📡 LIVE TERMINAL: <span id="status">OFFLINE</span></div>
            </div>
            <div class="scroll-area" id="tape" style="font-family: 'Courier New', monospace; font-size: 0.85rem;">
                <div style="color: #848e9c;">Ожидание данных от бота...</div>
            </div>
            <div class="terminal-footer" style="padding: 5px 15px; border-top: 1px solid var(--grid); font-size: 0.7rem; display: flex; justify-content: space-between;">
                <span>HOLD: <b id="web-hold">0</b>s</span>
                <span style="opacity: 0.5;">Baitan_0501 白坦</span>
            </div>
        </div>

        <!-- ГРАФИК -->
        <div class="box">
            <div class="box-header"><div class="box-title">BTC/USDT 15M</div><div id="vol-stat" style="font-size: 0.65rem; color: #848e9c;">VOL: ---</div></div>
            <div style="flex:1; position: relative;"><div id="tradingview_chart" style="height:100%; width:100%;"></div></div>
            <div class="btn-group">
                <button class="nav-btn" onclick="window.open('https://aggr.trade/t5k8')">AGGR</button>
                <button class="nav-btn" onclick="window.open('https://www.coinglass.com/pro/futures/LiquidationMap')">LIQ MAP</button>
                <button class="nav-btn" onclick="window.open('https://www.tensorcharts.com/')">TENSOR</button>
            </div>
        </div>

        <!-- НОВОСТИ -->
        <div class="box">
            <div class="box-header"><div class="box-title">Crypto News</div></div>
            <div class="scroll-area" id="rss-news">Загрузка ленты...</div>
        </div>
    </div>
</div>

<div class="watermark">Baitan_0501 白坦</div>
<audio id="silent-audio" loop preload="auto" style="display:none;"></audio>
<script src="script.js"></script>
</body>
</html>
