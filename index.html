<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breathing Station v8.8 - Baitan_0501 白坦</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="icon" type="image/png" href="https://github.com/bt0501/The-Breathing-Station/blob/main/ico.png?raw=true">
    <link rel="stylesheet" href="style.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rss-parser@3.12.0/dist/rss-parser.min.js"></script>
</head>
<body>

<div class="main-container">
    <div class="top-panel">
        <div><div class="label">UTC Time</div><h1 id="utc-time">00:00:00</h1></div>
        <div id="btc-box" class="stat-box"><span class="label">BTC/USDT LIVE</span><span id="btc-price" class="stat-value">$---</span></div>
        <div class="stat-box"><span class="label">Fear & Greed</span><span id="fg-value" class="stat-value">50</span></div>
        <div class="stat-box"><span class="label">ETH Gas</span><span id="gas-value" class="stat-value">-- Gwei</span></div>
        <div style="text-align:right"><div class="label">Local Time</div><div id="local-time" style="font-size:1.2rem; font-weight:bold">00:00:00</div></div>
    </div>

    <!-- Сессии как на скрине 323: в два ряда -->
    <div class="timeline-wrapper">
        <div id="cursor"></div>
        <div class="time-scale" id="scale"></div>
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <div class="tools-grid">
        <div class="box">
            <div class="box-header"><div class="box-title">📡 LIVE TERMINAL: ONLINE</div></div>
            <div id="tape" class="scroll-area"></div>
            <div class="terminal-footer">
                <span>HOLD: <b id="web-hold">0</b>s</span>
                <span>Baitan_0501 白坦</span>
            </div>
        </div>

        <div class="box">
            <div class="box-header"><div class="box-title">BTC/USDT 15M</div><div id="vol-stat">VOL: ---</div></div>
            <div style="flex:1; position: relative;"><div id="tradingview_chart" style="height:100%; width:100%;"></div></div>
            <div class="btn-group">
                <button class="nav-btn" onclick="window.open('https://aggr.trade/t5k8')">AGGR</button>
                <button class="nav-btn" onclick="window.open('https://www.coinglass.com/pro/futures/LiquidationMap')">LIQ MAP</button>
                <button class="nav-btn" onclick="window.open('https://www.tensorcharts.com/')">TENSOR</button>
            </div>
        </div>

        <div class="box">
            <div class="box-header"><div class="box-title">CRYPTO NEWS</div></div>
            <div class="scroll-area" id="rss-news">Загрузка ленты...</div>
        </div>
    </div>
</div>

<div id="analitics-modal" class="modal-float">
    <div class="modal-header">
        <span>📊 История тиков (1000)</span>
        <span class="close-modal" onclick="closeAnalitics()">×</span>
    </div>
    <div id="full-tape" class="modal-content-scroll"></div>
</div>

<script src="script.js"></script>
</body>
</html>
